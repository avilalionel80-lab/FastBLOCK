version: "3.9"

services:
  netshield-api:
    build: .
    container_name: netshield-api
    ports:
      - "8000:8000"
    environment:
      - MOCK_BLOCKCHAIN=true
      - DATABASE_URL=sqlite:///./netshield.db
      - SECRET_KEY=netshield-production-secret-key-change-me
      - LOG_LEVEL=INFO
      - RATE_LIMIT_PER_MINUTE=100
    volumes:
      - netshield_data:/app
    restart: unless-stopped

  netshield-api-production:
    build: .
    container_name: netshield-api-prod
    ports:
      - "8001:8000"
    environment:
      - MOCK_BLOCKCHAIN=false
      - NODE1_URL=http://besu-node1:8545
      - NODE2_URL=http://besu-node2:8546
      - NODE3_URL=http://besu-node3:8547
      - DATABASE_URL=sqlite:///./netshield.db
      - SECRET_KEY=netshield-production-secret-key-change-me
      - LOG_LEVEL=INFO
      - RATE_LIMIT_PER_MINUTE=100
    volumes:
      - netshield_data_prod:/app
    depends_on:
      - besu-node1
      - besu-node2
      - besu-node3
    restart: unless-stopped

  besu-node1:
    image: hyperledger/besu:24.12.0
    container_name: besu-node1
    ports:
      - "8545:8545"
      - "30303:30303"
    command: >
      --network=dev
      --rpc-http-enabled=true
      --rpc-http-api=ETH,NET,WEB3,QBFT
      --rpc-http-host=0.0.0.0
      --rpc-http-port=8545
      --miner-enabled=true
      --miner-coinbase=0xfe3b557e8fb62b89f4916b721be55ceb828dbd73
      --host-allowlist=*
    volumes:
      - besu_node1_data:/var/lib/besu

  besu-node2:
    image: hyperledger/besu:24.12.0
    container_name: besu-node2
    ports:
      - "8546:8545"
      - "30304:30303"
    command: >
      --network=dev
      --rpc-http-enabled=true
      --rpc-http-api=ETH,NET,WEB3,QBFT
      --rpc-http-host=0.0.0.0
      --rpc-http-port=8545
      --miner-enabled=true
      --miner-coinbase=0xfe3b557e8fb62b89f4916b721be55ceb828dbd73
      --host-allowlist=*
    volumes:
      - besu_node2_data:/var/lib/besu

  besu-node3:
    image: hyperledger/besu:24.12.0
    container_name: besu-node3
    ports:
      - "8547:8545"
      - "30305:30303"
    command: >
      --network=dev
      --rpc-http-enabled=true
      --rpc-http-api=ETH,NET,WEB3,QBFT
      --rpc-http-host=0.0.0.0
      --rpc-http-port=8545
      --miner-enabled=true
      --miner-coinbase=0xfe3b557e8fb62b89f4916b721be55ceb828dbd73
      --host-allowlist=*
    volumes:
      - besu_node3_data:/var/lib/besu

volumes:
  netshield_data:
  netshield_data_prod:
  besu_node1_data:
  besu_node2_data:
  besu_node3_data:
